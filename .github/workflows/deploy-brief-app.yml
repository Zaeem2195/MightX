# Deploy brief-app to Vercel (production) from GitHub Actions.
#
# One-time setup (in GitHub repo → Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — https://vercel.com/account/tokens (scope: full account or deploy-only)
#   VERCEL_ORG_ID      — Vercel dashboard → Team settings → General → Team ID
#   VERCEL_PROJECT_ID — Project → Settings → General → Project ID
#
# Also set SLACK_WEBHOOK_URL (and any others) in the Vercel project → Environment Variables
# so production builds/runtime match local .env.local.

name: Deploy brief-app to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "brief-app/**"
      - ".github/workflows/deploy-brief-app.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brief-app

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: brief-app/package-lock.json

      - name: Pull Vercel environment
        run: npx vercel@latest pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Install dependencies
        run: npm ci

      - name: Build (Vercel)
        run: npx vercel@latest build --prod --token=$VERCEL_TOKEN

      - name: Deploy prebuilt to production
        run: npx vercel@latest deploy --prebuilt --prod --token=$VERCEL_TOKEN
